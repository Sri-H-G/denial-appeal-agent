<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Denial Appeal Agent</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --border: #262b38;
    --text: #e6e8ee;
    --muted: #8992a6;
    --accent: #5b8def;
    --tool: #f2b84b;
    --result: #4bc27a;
    --error: #e05c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }
  .pane {
    background: var(--bg);
    overflow-y: auto;
    padding: 20px 24px;
  }
  .pane h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 14px;
  }
  .step {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 10px;
    font-size: 13px;
    background: var(--panel);
  }
  .step .label {
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .step.tool_call .label { color: var(--tool); }
  .step.tool_result .label { color: var(--result); }
  .step.assistant_text .label { color: var(--accent); }
  .step.error .label { color: var(--error); }
  .step pre {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: var(--text);
  }
  #letter {
    white-space: pre-wrap;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 13px;
    line-height: 1.6;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .placeholder { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Denial Appeal Agent</h1>
    <p>Reads the denial, the chart, and the payer policy — drafts a cited appeal. Human review required before sending.</p>
  </div>
  <button id="runBtn">Run appeal agent</button>
</header>

<main>
  <div class="pane">
    <h2>Live reasoning trail</h2>
    <div id="trace"><p class="placeholder">Click "Run appeal agent" to start.</p></div>
  </div>
  <div class="pane">
    <h2>Drafted appeal letter (for human review)</h2>
    <div id="letter"><p class="placeholder">Nothing drafted yet.</p></div>
  </div>
</main>

<script>
const runBtn = document.getElementById("runBtn");
const trace = document.getElementById("trace");
const letterEl = document.getElementById("letter");

function addStep(type, label, body) {
  const div = document.createElement("div");
  div.className = "step " + type;
  const pre = document.createElement("pre");
  pre.textContent = body;
  const labelEl = document.createElement("div");
  labelEl.className = "label";
  labelEl.textContent = label;
  div.appendChild(labelEl);
  div.appendChild(pre);
  trace.appendChild(div);
  trace.scrollTop = trace.scrollHeight;
}

runBtn.addEventListener("click", () => {
  trace.innerHTML = "";
  letterEl.innerHTML = '<p class="placeholder">Working...</p>';
  runBtn.disabled = true;
  runBtn.textContent = "Running...";

  const source = new EventSource("/api/run-appeal");

  source.onmessage = (e) => {
    const event = JSON.parse(e.data);

    if (event.type === "assistant_text") {
      addStep("assistant_text", "Agent reasoning", event.text);
    } else if (event.type === "tool_call") {
      addStep("tool_call", "Tool call: " + event.tool, JSON.stringify(event.input, null, 2));
    } else if (event.type === "tool_result") {
      addStep("tool_result", "Result: " + event.tool, JSON.stringify(event.output, null, 2));
    } else if (event.type === "final") {
      letterEl.innerHTML = "";
      const pre = document.createElement("pre");
      pre.textContent = event.letter;
      letterEl.appendChild(pre);
      source.close();
      runBtn.disabled = false;
      runBtn.textContent = "Run appeal agent";
    } else if (event.type === "error") {
      addStep("error", "Error", event.message);
      source.close();
      runBtn.disabled = false;
      runBtn.textContent = "Run appeal agent";
    } else if (event.type === "max_iterations") {
      addStep("error", "Stopped", "Hit max iterations without drafting an appeal.");
      source.close();
      runBtn.disabled = false;
      runBtn.textContent = "Run appeal agent";
    }
  };

  source.onerror = () => {
    source.close();
    runBtn.disabled = false;
    runBtn.textContent = "Run appeal agent";
  };
});
</script>

</body>
</html>
